<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie - Technik Trainer</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; flex-shrink: 0; }
        .nav-icon { font-size: 26px; color: white; margin-bottom: 25px; cursor: pointer; opacity: 0.8; transition: 0.3s; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 50px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: bold; justify-content: space-between; }
        .content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 800px; }
        .active-screen { display: block; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .topic-box { background: #eef6ff; padding: 40px; border-radius: 15px; border: 3px solid var(--ihk-blau); text-align: center; cursor: pointer; transition: 0.3s; }
        .opt-btn { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover { background: #f0f7ff; border-color: var(--ihk-blau); }
        .btn-primary { background: var(--ihk-rot); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #explOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .expl-box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .lb-entry { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="explOverlay">
        <div class="expl-box">
            <h2 style="color:var(--ihk-rot)">💡 Lösungsweg</h2>
            <p id="explText" style="text-align: left; line-height: 1.6; margin: 20px 0;"></p>
            <button class="btn-primary" onclick="closeExpl()">Verstanden & Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" onclick="nav('screen-dashboard')">🏠</div>
        <div class="nav-icon" onclick="showLB()">🏆</div>
    </div>

    <div class="main">
        <div class="topbar">
            <span>IHK AKADEMIE - Technik Trainer</span>
            <span id="displayUser"></span>
        </div>
        
        <div class="content">
            <div id="screen-login" class="screen active-screen">
                <div class="card" style="max-width: 400px;">
                    <h2 style="color:var(--ihk-blau)">Anmeldung</h2>
                    <input type="text" id="userName" placeholder="Dein Name...">
                    <input type="password" id="adminKey" placeholder="Admin-Passwort (optional)">
                    <button class="btn-primary" onclick="doLogin()">Starten</button>
                </div>
            </div>

            <div id="screen-dashboard" class="screen">
                <h1 style="color:var(--ihk-blau)">Themenauswahl</h1>
                <div class="topic-box" onclick="initQuiz()">
                    <h2 style="margin:0; color:var(--ihk-blau)">Technische Mathematik</h2>
                    <p style="margin:10px 0 0 0; color:#555;">Fragenpool: Seite 1 - 22</p>
                </div>
            </div>

            <div id="screen-quiz" class="screen">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--ihk-rot); font-weight:bold;">
                        <span id="qProgress"></span>
                        <span>Score: <span id="currentScore">0</span></span>
                    </div>
                    <h2 id="questionText" style="margin-top:0; color:var(--ihk-blau);"></h2>
                    <div id="optionsArea"></div>
                </div>
            </div>

            <div id="screen-leaderboard" class="screen">
                <div class="card">
                    <h1 style="color:var(--ihk-blau)">🏆 Bestenliste</h1>
                    <div id="lbList"></div>
                    <button class="btn-primary" onclick="nav('screen-dashboard')">Zurück</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const ADMIN_PW = "ihk2024";

    // ============================================================
    // START: FRAGEN-DATENBANK (HIER FRAGEN HINZUFÜGEN ODER ÄNDERN)
    // ============================================================
    const db = [
        // --- BEREICH: RUNDEN & GRUNDLAGEN ---
        { q: "Runde 8,579 613 auf drei Ziffern hinter dem Komma.", o: ["8,579", "8,578", "8,580", "8,581"], c: 2, hint: "Vierte Stelle ist 6 (ab 5 aufrunden). Die 9 wird 10, Übertrag auf 7 -> 8,580." },
        { q: "Runde 1,995 auf zwei Ziffern hinter dem Komma.", o: ["1,90", "1,96", "1,99", "2,00"], c: 3, hint: "Dritte Stelle ist 5. Aufrunden! 1,99 + 0,01 = 2,00." },
        
        // --- BEREICH: MESSWERTE (GENAUIGKEIT) ---
        { q: "Berechne L = 1,25m + 251cm + 15cm + 14,3mm (Regeln f. Messwerte).", o: ["3924,3 mm", "392,4 cm", "3,92 m", "3,9 m"], c: 2, hint: "Ergebnis darf nicht genauer als das ungenaueste Maß (1,25m) sein. Summe 3,9243m -> 3,92m." },
        { q: "Dichte 0,87 kg/dm³, Vol. 43,5 L. Masse m korrekt gerundet?", o: ["37,845 kg", "38 kg", "37,8 kg", "37,85 kg"], c: 2, hint: "0,87 hat 2 Nachkommastellen. Ergebnis 37,845 muss auf 37,8 kg gerundet werden." },

        // --- BEREICH: FORMELUMSTELLUNG ---
        { q: "Stelle nach t um: P = W / t", o: ["t = W + P", "t = P / W", "t = W / P", "t = W * P"], c: 2, hint: "t wandert nach oben, P nach unten." },
        { q: "Stelle nach d um: vc = (d * π * n) / 1000", o: ["d = (1000 * vc) / (π * n)", "d = (π * n) / (1000 * vc)", "d = 1000 / (vc * π * n)"], c: 0, hint: "1000 mal vc durch (Pi mal n)." },

        // --- BEREICH: TECHNIK-RECHNEN ---
        { q: "Stab (895 mm) im Verhältnis 2:3 geteilt. Wie lang ist das GRÖẞERE Stück?", o: ["179 mm", "358 mm", "537 mm"], c: 2, hint: "895 / 5 Anteile = 179. Großes Stück: 3 * 179 = 537 mm." },
        { q: "Leiste 1600mm, 14 Löcher, Rand je 25,5mm. Abstand p?", o: ["123 mm", "121 mm", "119 mm", "110 mm"], c: 2, hint: "(1600 - 51) / (14-1) = 119,15 -> 119 mm." },
        { q: "Stange 5,5m, 15 Stücke à 240,5mm, Sägeblatt 3mm. Rest L?", o: ["1,4 m", "1,6 m", "1,8 m", "1,9 m"], c: 2, hint: "15 * (240,5+3) = 3652,5. 5500 - 3652,5 = 1847,5 -> 1,8 m." },

        // --- BEREICH: EINHEITEN ---
        { q: "Wieviel dm² sind 6317 cm²?", o: ["0,6317 dm²", "63,17 dm²", "631,7 dm²"], c: 1, hint: "Umrechnung Fläche ist 100: 6317 / 100 = 63,17 dm²." }
    ];
    // ============================================================
    // ENDE: FRAGEN-DATENBANK
    // ============================================================

    let user = "", isAdmin = false, score = 0, qIdx = 0, pool = [];

    function doLogin() {
        const n = document.getElementById('userName').value;
        const p = document.getElementById('adminKey').value;
        if(!n) return alert("Name fehlt!");
        user = n;
        if(p === ADMIN_PW) { isAdmin = true; user = "⭐ Admin (" + n + ")"; }
        document.getElementById('displayUser').innerText = "Angemeldet: " + user;
        nav('screen-dashboard');
    }

    function initQuiz() {
        pool = [...db].sort(() => Math.random() - 0.5);
        qIdx = 0; score = 0;
        document.getElementById('currentScore').innerText = "0";
        nav('screen-quiz');
        loadQ();
    }

    function loadQ() {
        const q = pool[qIdx];
        document.getElementById('qProgress').innerText = `Frage ${qIdx + 1}/${pool.length}`;
        document.getElementById('questionText').innerText = q.q;
        const area = document.getElementById('optionsArea');
        area.innerHTML = "";
        q.o.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o;
            b.onclick = () => {
                if(i === q.c) { score += 10; document.getElementById('currentScore').innerText = score; nextQ(); }
                else { document.getElementById('explText').innerText = q.hint; document.getElementById('explOverlay').style.display = 'flex'; }
            };
            area.appendChild(b);
        });
    }

    function nextQ() {
        qIdx++;
        if(qIdx < pool.length) loadQ();
        else { alert("Abgeschlossen!"); saveScore(); nav('screen-dashboard'); }
    }

    function closeExpl() { document.getElementById('explOverlay').style.display = 'none'; nextQ(); }

    function saveScore() {
        let lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        lb.push({n: user, s: score});
        localStorage.setItem('ihk_scores', JSON.stringify(lb));
    }

    function showLB() {
        nav('screen-leaderboard');
        const lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        document.getElementById('lbList').innerHTML = lb.sort((a,b)=>b.s-a.s).slice(0,10).map(e => `
            <div class="lb-entry">
                <span><b>${e.n}</b></span>
                <span>${e.s} Pkt</span>
            </div>`).join('');
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }
</script>
</body>
</html>
