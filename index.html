<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Lern-App - TechMathe</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .sidebar { width: 64px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-icon { font-size: 24px; color: white; margin-bottom: 30px; cursor: pointer; opacity: 0.7; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 48px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: 600; }
        .content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        
        /* Login & Views */
        #loginScreen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .topic-box { background: white; padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }
        .topic-box.active { border-color: var(--ihk-rot); background: #fffafa; }
        
        .btn { background: var(--ihk-rot); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .view { display: none; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; }
        .opt-btn:hover { background: #f0f7ff; }

        /* Erklärungs-Overlay */
        #explanationOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .expl-card { background: white; padding: 30px; border-radius: 12px; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <div id="explanationOverlay">
        <div class="expl-card">
            <h2 id="explTitle" style="color:var(--ihk-rot)">Leider falsch!</h2>
            <p id="explText" style="line-height:1.6; font-size:1.1rem;"></p>
            <button class="btn" onclick="closeExpl()">Verstanden & Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
        <div class="nav-icon" onclick="showLeaderboard()">🏆</div>
    </div>

    <div class="main">
        <div class="topbar">IHK Akademie - Technisches Quiz</div>
        <div class="content">
            <div id="loginScreen">
                <div class="card">
                    <h2>Anmeldung</h2>
                    <input type="text" id="uName" placeholder="Dein Name...">
                    <button class="btn" onclick="login()">Starten</button>
                </div>
            </div>

            <div id="dashboard" style="display:none">
                <h1>Themenbereiche</h1>
                <div class="grid" id="topicGrid"></div>
                <button class="btn" id="startBtn" onclick="initQuiz()" disabled style="margin-top:20px">QUIZ STARTEN</button>
            </div>

            <div id="quizView" class="view">
                <h2 id="qText" style="color:var(--ihk-blau)"></h2>
                <div id="optContainer"></div>
            </div>

            <div id="leaderboardView" class="view">
                <h2>🏆 Bestenliste</h2>
                <div id="lList"></div>
            </div>
        </div>
    </div>

<script>
    const questions = [
        // --- TECHNISCHE MATHEMATIK (Aus deiner PDF) ---
        { 
            t: "Technische Mathematik", 
            q: "Runde die Zahl 8,579 613 auf drei Ziffern hinter dem Komma.", 
            o: ["8,579", "8,578", "8,580"], 
            c: 2,
            hint: "Da die vierte Ziffer eine '6' ist (größer als 5), muss aufgerundet werden. Aus der 9 wird eine 10, was die Stelle davor erhöht: 8,580."
        },
        { 
            t: "Technische Mathematik", 
            q: "Berechne die Summe der Längen: 1,25m; 251cm; 15cm; 14,3mm. Welches Ergebnis ist nach den Regeln für Messwerte richtig?", 
            o: ["3,9243 m", "3,92 m", "3,9 m"], 
            c: 1,
            hint: "Das Ergebnis darf nicht genauer sein als der ungenaueste Messwert. 1,25m hat zwei Nachkommastellen, daher muss das Ergebnis auch auf zwei Stellen gerundet werden."
        },
        { 
            t: "Technische Mathematik", 
            q: "Welche Rundung auf zwei Ziffern hinter dem Komma ist RICHTIG?", 
            o: ["1,995 -> 1,90", "7,034 -> 7,04", "3,4447 -> 3,44"], 
            c: 2,
            hint: "Bei 3,4447 ist die dritte Stelle eine '4'. Daher wird abgerundet. Das Ergebnis bleibt 3,44."
        },
        { 
            t: "Technische Mathematik", 
            q: "Die Formel für die Leistung lautet P = W / t. Wie lautet die Formel umgestellt nach der Zeit t?", 
            o: ["t = P * W", "t = W / P", "t = P / W"], 
            c: 1,
            hint: "Um t zu isolieren, tauschen P und t die Plätze (Multiplikation mit t, Division durch P). Somit gilt: Zeit = Arbeit / Leistung."
        }
    ];

    let user = "", score = 0, selectedTopic = null, pool = [], currentQIdx = 0;

    function login() {
        user = document.getElementById('uName').value;
        if(!user) return alert("Name?");
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderTopics();
    }

    function renderTopics() {
        const g = document.getElementById('topicGrid');
        const ts = ["Technische Mathematik", "Metalltechnik"];
        g.innerHTML = "";
        ts.forEach(t => {
            const d = document.createElement('div');
            d.className = 'topic-box';
            d.innerHTML = `<span style="font-size:2rem">🧮</span><b>${t}</b>`;
            d.onclick = () => {
                document.querySelectorAll('.topic-box').forEach(b => b.classList.remove('active'));
                d.classList.add('active'); selectedTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            g.appendChild(d);
        });
    }

    function initQuiz() {
        pool = questions.filter(q => q.t === selectedTopic);
        currentQIdx = 0;
        showView('quizView');
        loadQuestion();
    }

    function loadQuestion() {
        const q = pool[currentQIdx];
        document.getElementById('qText').innerText = q.q;
        const container = document.getElementById('optContainer');
        container.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => checkAnswer(i);
            container.appendChild(b);
        });
    }

    function checkAnswer(idx) {
        const q = pool[currentQIdx];
        if(idx === q.c) {
            score += 10;
            alert("Richtig! 🌟");
            nextQuestion();
        } else {
            // Zeige das Erklärungs-Overlay
            document.getElementById('explText').innerText = q.hint;
            document.getElementById('explanationOverlay').style.display = 'flex';
        }
    }

    function closeExpl() {
        document.getElementById('explanationOverlay').style.display = 'none';
        nextQuestion();
    }

    function nextQuestion() {
        currentQIdx++;
        if(currentQIdx < pool.length) loadQuestion();
        else { alert("Thema abgeschlossen!"); goHome(); }
    }

    function goHome() { 
        document.getElementById('quizView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    function showView(id) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
