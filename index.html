<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Schwaben - Lern-App</title>
    <style>
        :root {
            --ihk-blau: #00457D;
            --ihk-rot: #E3001B;
            --text-hell: #FFFFFF;
        }

        body {
            margin: 0; padding: 0; display: flex; height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text-hell);
            
            /* HIER WIRD DEIN HOCHGELADENES BILD GEZOGEN */
            background-image: url('Teams_Hintergrund.jpg'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--ihk-blau); /* Fallback */
        }

        /* Glaseffekt für die Boxen */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .teams-sidebar { width: 64px; background: rgba(0, 69, 125, 0.8); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .teams-topbar { height: 48px; background: rgba(0, 69, 125, 0.7); display: flex; align-items: center; padding: 0 20px; font-size: 14px; font-weight: 600; }

        .app-content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; margin-bottom: 25px;
        }
        
        /* Das Logo oben links (IHK Logo) */
        .ihk-logo { height: 45px; filter: brightness(0) invert(1); }

        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        .topic-card { 
            padding: 30px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .topic-card:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); }
        .topic-card.active { border: 2px solid var(--ihk-rot); background: rgba(255, 255, 255, 0.2); }

        .topic-icon { font-size: 3rem; margin-bottom: 10px; }
        .topic-name { font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }

        .start-btn { 
            width: 100%; background: var(--ihk-rot); color: white; border: none; 
            padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; 
            cursor: pointer; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .start-btn:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); cursor: not-allowed; }

        .quiz-view { display: none; padding: 40px; }
        .option-btn { 
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; 
            text-align: left; cursor: pointer; font-size: 1.1rem; 
        }
        .option-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="teams-sidebar">🏠<br><br>💬<br><br>👥</div>

    <div class="main-container">
        <div class="teams-topbar">IHK Akademie Schwaben - Lernportal</div>
        <div class="app-content">
            
            <div class="app-header glass">
                <img src="https://www.ihk-akademie-schwaben.de/fileadmin/templates/images/logo_ihk_akademie_schwaben.png" class="ihk-logo">
                <div style="font-weight: bold; color: #FFCC00;">🏆 <span id="points">0 Punkte</span></div>
            </div>

            <div id="dash">
                <h1 style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">Gewerblich-Technische Lern-App</h1>
                <div class="topics-grid" id="grid"></div>
                <button class="start-btn" id="sBtn" onclick="start()" disabled>QUIZ STARTEN</button>
            </div>

            <div id="quiz" class="quiz-view glass">
                <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer; margin-bottom:20px;">⬅ Zurück</button>
                <h2 id="qText">Frage...</h2>
                <div id="opts"></div>
            </div>

        </div>
    </div>

<script>
    const questions = [
        { t: "Steuerungstechnik", q: "Was bedeutet SPS?", o: ["Sicherheits-Prüf-System", "Speicherprogrammierbare Steuerung", "Sensor-System"], c: 1 },
        { t: "Metalltechnik", q: "Werkzeug zum Anreißen?", o: ["Hammer", "Reißnadel", "Feile"], c: 1 },
        { t: "Elektrotechnik", q: "Einheit des Widerstands?", o: ["Volt", "Ampere", "Ohm"], c: 2 }
    ];

    let selected = null;
    const icons = { "Metalltechnik": "⚙️", "Steuerungstechnik": "🕹️", "Elektrotechnik": "⚡" };

    function init() {
        const g = document.getElementById('grid');
        const ts = [...new Set(questions.map(q => q.topic))];
        ts.forEach(t => {
            const d = document.createElement('div');
            d.className = 'topic-card glass';
            d.innerHTML = `<span class="topic-icon">${icons[t]||'📚'}</span><span class="topic-name">${t}</span>`;
            d.onclick = () => {
                document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
                d.classList.add('active'); selected = t;
                document.getElementById('sBtn').disabled = false;
            };
            g.appendChild(d);
        });
    }

    function start() {
        document.getElementById('dash').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        const q = questions.find(q => q.topic === selected);
        document.getElementById('qText').innerText = q.q;
        const oContainer = document.getElementById('opts');
        oContainer.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => { if(i === q.c) { alert("Richtig!"); location.reload(); } else { alert("Falsch!"); } };
            oContainer.appendChild(b);
        });
    }
    init();
</script>
</body>
</html>
