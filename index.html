<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Schwaben - Technik-Lern-App</title>
    <style>
        :root {
            --ihk-blau: #00457D;
            --ihk-rot: #E3001B;
            --text-hell: #FFFFFF;
            --success: #107c10;
            --error: #a4262c;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh;
            color: var(--text-hell);
            
            /* FALLBACK: Dunkelblau, falls das Bild fehlt */
            background-color: var(--ihk-blau); 
            
            /* HINTERGRUND-BILD */
            background-image: url('hintergrund.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Schatten für bessere Lesbarkeit, falls das Bild hell ist */
        h1, h2, .topic-name, .topbar-title, .score-badge {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .teams-sidebar { width: 64px; background-color: rgba(0, 69, 125, 0.9); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .sidebar-icon { font-size: 20px; margin-bottom: 25px; opacity: 0.7; color: white; cursor: pointer; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .teams-topbar { 
            height: 48px; 
            background-color: rgba(0, 69, 125, 0.8); 
            backdrop-filter: blur(5px);
            display: flex; align-items: center; padding: 0 20px; color: white; 
        }

        .app-content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 12px; 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .ihk-logo { height: 40px; filter: brightness(0) invert(1); }
        .score-badge { color: #f59e0b; font-weight: bold; font-size: 1.2rem; }

        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }

        .topic-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); border-radius: 16px; padding: 35px 25px; 
            text-align: center; cursor: pointer; transition: 0.2s; 
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center;
        }

        .topic-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); }
        .topic-card.active { border-color: var(--ihk-rot); border-width: 3px; background: rgba(255, 255, 255, 0.25); }
        
        .topic-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .topic-name { font-weight: 600; font-size: 1.2rem; }
        
        .start-quiz-btn { 
            grid-column: 1 / -1; background-color: var(--ihk-rot); 
            color: white; border: none; padding: 20px; border-radius: 12px; 
            font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .start-quiz-btn:disabled { background-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); cursor: not-allowed; }

        .quiz-view { 
            display: none; background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(20px); border-radius: 15px; padding: 40px; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .option-btn { 
            width: 100%; padding: 15px; margin: 8px 0; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; 
            background: rgba(255, 255, 255, 0.1); color: white; 
            text-align: left; cursor: pointer; font-size: 1.1rem;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .option-btn.correct { border-color: var(--success); background: rgba(16, 124, 16, 0.3); color: #8fef8f; font-weight: bold; }
        .option-btn.wrong { border-color: var(--error); background: rgba(164, 38, 44, 0.3); color: #ff9999; }
        
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: rgba(255,255,255,0.1); }
        .next-btn { margin-top:20px; padding:12px 25px; background:var(--ihk-blau); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

    <div class="teams-sidebar">
        <div class="sidebar-icon">🏠</div><div class="sidebar-icon">💬</div><div class="sidebar-icon">👥</div>
    </div>

    <div class="main-container">
        <div class="teams-topbar"><span class="topbar-title">IHK Akademie Schwaben - Digitales Lernportal</span></div>

        <div class="app-content">
            <div class="app-header">
                <img src="https://www.ihk-akademie-schwaben.de/fileadmin/templates/images/logo_ihk_akademie_schwaben.png" alt="IHK Logo" class="ihk-logo">
                <div class="score-badge">🏆 <span id="totalScore">0 Punkte</span></div>
            </div>

            <div id="dashboardView">
                <h1 style="margin: 0 0 10px 0;">Gewerblich-Technische Lern-App</h1>
                <p style="opacity: 0.8; font-size: 1.1rem;">Wähle ein Thema aus, um zu starten:</p>
                <div class="topics-grid" id="topicsGrid"></div>
                <button class="start-quiz-btn" id="startBtn" onclick="startQuiz()" disabled>QUIZ STARTEN</button>
            </div>

            <div id="quizView" class="quiz-view">
                <button onclick="showDashboard()" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; margin-bottom:20px;">⬅ Zurück</button>
                <div id="quizContent">
                    <h2 id="questionText">Frage...</h2>
                    <div id="optionsContainer"></div>
                    <div id="feedbackBox" class="feedback"></div>
                    <button id="nextBtn" onclick="nextQuestion()" class="next-btn" style="display:none;">Nächste Frage ➡</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const allQuestions = [
        { topic: "Steuerungstechnik", level: 1, q: "Was bedeutet die Abkürzung 'SPS'?", options: ["Sicherheits-Prüf-System", "Speicherprogrammierbare Steuerung", "Serielle Prozess-Steuerung"], correct: 1, hint: "Englisch: PLC (Programmable Logic Controller)." },
        { topic: "Metalltechnik", level: 1, q: "Welches Werkzeug nutzt man zum Anreißen?", options: ["Bleistift", "Reißnadel", "Feile"], correct: 1, hint: "Die gehärtete Spitze der Reißnadel ritzt die Oberfläche an." },
        { topic: "Elektrotechnik", level: 1, q: "In welcher Einheit wird der elektrische Widerstand gemessen?", options: ["Volt", "Ampere", "Ohm"], correct: 2, hint: "Die Einheit ist Ohm (Ω)." },
        { topic: "Fachrechnen", level: 2, q: "Formel für die Schnittgeschwindigkeit?", options: ["v = d * π * n", "v = d / n", "v = F * s"], correct: 0, hint: "v = Durchmesser mal Pi mal Drehzahl." }
    ];

    let currentScore = 0, selectedTopic = null, quizPool = [], currentIdx = 0;
    const topicIcons = { "Metalltechnik": "⚙️", "Elektrotechnik": "⚡", "Fachrechnen": "📐", "Steuerungstechnik": "🕹️" };

    function initDashboard() {
        const grid = document.getElementById('topicsGrid');
        const topics = [...new Set(allQuestions.map(q => q.topic))];
        grid.innerHTML = "";
        topics.forEach(t => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `<span class="topic-icon">${topicIcons[t] || "📚"}</span><span class="topic-name">${t}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active'); selectedTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            grid.appendChild(card);
        });
    }

    function startQuiz() {
        quizPool = allQuestions.filter(q => q.topic === selectedTopic);
        currentIdx = 0;
        document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('quizView').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizPool[currentIdx];
        document.getElementById('questionText').innerText = q.q;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = "";
        document.getElementById('feedbackBox').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                const fb = document.getElementById('feedbackBox');
                fb.style.display = 'block';
                if(i === q.correct) {
                    btn.classList.add('correct');
                    fb.innerHTML = `✅ Richtig! +${q.level * 10} Pkt.<br><small>${q.hint}</small>`;
                    currentScore += (q.level * 10);
                    document.getElementById('totalScore').innerText = currentScore + " Punkte";
                } else {
                    btn.classList.add('wrong');
                    fb.innerHTML = `❌ Falsch.<br><small>${q.hint}</small>`;
                }
                if(currentIdx < quizPool.length - 1) document.getElementById('nextBtn').style.display = 'block';
                else setTimeout(() => { alert("Fertig!"); showDashboard(); }, 2000);
            };
            container.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }
    function showDashboard() { 
        document.getElementById('dashboardView').style.display = 'block'; 
        document.getElementById('quizView').style.display = 'none'; 
        initDashboard();
    }

    initDashboard();
</script>
</body>
</html>
