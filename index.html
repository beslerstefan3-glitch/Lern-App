<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Lern-App</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; }
        
        /* Sidebar */
        .sidebar { width: 64px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; flex-shrink: 0; }
        .nav-icon { font-size: 24px; color: white; margin-bottom: 30px; cursor: pointer; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 48px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: bold; }
        .content { flex: 1; padding: 20px; overflow-y: auto; position: relative; }

        /* Screens */
        .screen { display: none; }
        .active-screen { display: block; }

        /* Login Card */
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; margin: 100px auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .topic-box { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; transition: 0.2s; }
        .topic-box:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .topic-box.selected { border-color: var(--ihk-rot); background: #fffafa; }

        .btn { background: var(--ihk-rot); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Quiz View */
        .quiz-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 1rem; }
        .opt-btn:hover { background: #f0f7ff; }

        /* Pop-up Overlay */
        #explanationOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 9999; justify-content: center; align-items: center; padding: 20px;
        }
        .expl-card { background: white; padding: 25px; border-radius: 12px; max-width: 450px; text-align: center; }
    </style>
</head>
<body>

    <div id="explanationOverlay">
        <div class="expl-card">
            <h2 style="color:var(--ihk-rot); margin-top:0;">Hinweis</h2>
            <p id="explText" style="line-height:1.5; font-size:1.1rem; margin-bottom:20px;"></p>
            <button class="btn" onclick="closeExpl()">Verstanden & Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" onclick="showDashboard()">🏠</div>
    </div>

    <div class="main">
        <div class="topbar">IHK Akademie Schwaben - Lern-App</div>
        <div class="content">

            <div id="screen-login" class="screen active-screen">
                <div class="login-card">
                    <h2 style="color:var(--ihk-blau)">Anmeldung</h2>
                    <input type="text" id="uName" placeholder="Name eingeben...">
                    <button class="btn" onclick="login()">Starten</button>
                </div>
            </div>

            <div id="screen-dashboard" class="screen">
                <h1 style="color:var(--ihk-blau)">Themenbereiche</h1>
                <div class="grid" id="topicGrid"></div>
                <button class="btn" id="startBtn" onclick="startQuiz()" disabled style="margin-top:30px; max-width: 300px;">QUIZ STARTEN</button>
            </div>

            <div id="screen-quiz" class="screen">
                <div class="quiz-container">
                    <h2 id="qText" style="color:var(--ihk-blau); margin-top:0;">Frage</h2>
                    <div id="optContainer"></div>
                </div>
            </div>

        </div>
    </div>

<script>
    // 1. DATENBANK
    const questions = [
        { t: "Technische Mathematik", q: "Runde 8,579 613 auf drei Stellen nach dem Komma.", o: ["8,579", "8,578", "8,580"], c: 2, hint: "Die 4. Stelle ist eine '6'. Ab 5 wird aufgerundet. Aus der 9 am Ende wird eine 10, die Stelle davor erhöht sich." },
        { t: "Technische Mathematik", q: "Summe: 1,25m + 251cm + 15cm + 14,3mm (Regeln für Messwerte)?", o: ["3,9243 m", "3,92 m", "3,9 m"], c: 1, hint: "Das Ergebnis darf nicht genauer sein als der ungenaueste Wert (1,25m). Also zwei Nachkommastellen." },
        { t: "Metalltechnik", q: "Kühlmittel beim Bohren von Stahl?", o: ["Spiritus", "Emulsion", "Wasser"], c: 1, hint: "Emulsion kühlt und schmiert gleichzeitig." },
        { t: "Steuerungstechnik", q: "Was ist eine SPS?", o: ["PC-System", "Speicherprogrammierbare Steuerung", "Sensor-System"], c: 1, hint: "SPS steuert automatisierte Abläufe in der Industrie." },
        { t: "Elektrotechnik", q: "Einheit des Widerstands?", o: ["Volt", "Ampere", "Ohm"], c: 2, hint: "Widerstand wird in Ohm (Ω) gemessen." },
        { t: "Prüfungsvorbereitung", q: "Was muss zur Prüfung mit?", o: ["Berichtsheft & Ausweis", "Nur Handy", "Nichts"], c: 0, hint: "Ohne Berichtsheft keine Zulassung!" }
    ];

    let currentTopic = "";
    let currentPool = [];
    let qIdx = 0;

    // 2. NAVIGATION & LOGIN
    function login() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("Name?");
        showScreen('screen-dashboard');
        renderTopics();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function renderTopics() {
        const grid = document.getElementById('topicGrid');
        const topics = ["Metalltechnik", "Steuerungstechnik", "Elektrotechnik", "Technische Mathematik", "Prüfungsvorbereitung"];
        grid.innerHTML = "";
        topics.forEach(t => {
            const box = document.createElement('div');
            box.className = 'topic-box';
            let icon = "📚";
            if(t === "Technische Mathematik") icon = "🧮";
            if(t === "Prüfungsvorbereitung") icon = "🎓";
            box.innerHTML = `<div style="font-size:24px">${icon}</div><b>${t}</b>`;
            box.onclick = () => {
                document.querySelectorAll('.topic-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                currentTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            grid.appendChild(box);
        });
    }

    function showDashboard() {
        currentTopic = "";
        document.getElementById('startBtn').disabled = true;
        showScreen('screen-dashboard');
        renderTopics();
    }

    // 3. QUIZ LOGIK
    function startQuiz() {
        currentPool = questions.filter(q => q.t === currentTopic);
        if(currentPool.length === 0) return alert("Keine Fragen!");
        currentPool.sort(() => Math.random() - 0.5);
        qIdx = 0;
        showScreen('screen-quiz');
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentPool[qIdx];
        document.getElementById('qText').innerText = q.q;
        const container = document.getElementById('optContainer');
        container.innerHTML = "";
        
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === q.c) {
                    alert("Richtig! 🌟");
                    nextQuestion();
                } else {
                    document.getElementById('explText').innerText = q.hint;
                    document.getElementById('explanationOverlay').style.display = 'flex';
                }
            };
            container.appendChild(btn);
        });
    }

    function closeExpl() {
        document.getElementById('explanationOverlay').style.display = 'none';
        nextQuestion();
    }

    function nextQuestion() {
        qIdx++;
        if(qIdx < currentPool.length) {
            loadQuestion();
        } else {
            alert("Fertig mit " + currentTopic + "!");
            showDashboard();
        }
    }
</script>
</body>
</html>
