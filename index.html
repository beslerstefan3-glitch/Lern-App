<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Schwaben - Master Trainer Mathematik</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-icon { font-size: 26px; color: white; margin-bottom: 25px; cursor: pointer; transition: 0.2s; }
        .nav-icon:hover { transform: scale(1.1); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar { height: 50px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: bold; justify-content: space-between; }
        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 850px; }
        .active-screen { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; box-sizing: border-box; }
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .topic-card { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .topic-card:hover { border-color: var(--ihk-blau); }
        .topic-card.selected { border-color: var(--ihk-rot); background: #fffafa; }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 1rem; }
        .opt-btn:hover { background: #f0f7ff; }
        .btn-primary { background: var(--ihk-rot); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        #explOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .expl-box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <div id="explOverlay">
        <div class="expl-box">
            <h2 style="color:var(--ihk-rot)">Lösungsweg</h2>
            <p id="explText" style="text-align: left; line-height: 1.5;"></p>
            <button class="btn-primary" onclick="closeExpl()">Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" onclick="nav('screen-dashboard')">🏠</div>
        <div class="nav-icon" onclick="showLB()">🏆</div>
    </div>

    <div class="main">
        <div class="topbar"><span>IHK AKADEMIE - Technik Trainer</span><span id="displayUser"></span></div>
        <div class="content">
            <div id="screen-login" class="screen active-screen">
                <div class="card" style="max-width: 400px;">
                    <h2>Anmeldung</h2>
                    <input type="text" id="userName" placeholder="Dein Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
                    <button class="btn-primary" onclick="doLogin()">Starten</button>
                </div>
            </div>

            <div id="screen-dashboard" class="screen">
                <h1>Themenbereiche (S. 1-22)</h1>
                <div class="topic-grid" id="topicGrid"></div>
                <button class="btn-primary" id="startBtn" onclick="initQuiz()" disabled>QUIZ STARTEN</button>
            </div>

            <div id="screen-quiz" class="screen">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--ihk-blau); font-weight:bold;">
                        <span id="qProgress"></span>
                        <span>Punkte: <span id="currentScore">0</span></span>
                    </div>
                    <h2 id="questionText"></h2>
                    <div id="optionsArea"></div>
                </div>
            </div>

            <div id="screen-leaderboard" class="screen">
                <div class="card">
                    <h2>🏆 Bestenliste</h2>
                    <div id="lbList"></div>
                    <button class="btn-primary" onclick="nav('screen-dashboard')">Zurück</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const db = [
        // RUNDEN (S. 1-2)
        { t: "Grundlagen", q: "Runde 8,579 613 auf drei Stellen nach dem Komma.", o: ["8,579", "8,578", "8,580", "8,581"], c: 2, hint: "Vierte Stelle ist 6 -> Aufrunden der dritten Stelle (9 wird 10, Übertrag auf 7)." },
        { t: "Grundlagen", q: "In welcher Zeile ist die Rundung auf 2 Stellen RICHTIG? (1) 1,995->1,90 (2) 7,034->7,04 (3) 3,4447->3,45 (4) 15,446->15,45", o: ["Zeile 1", "Zeile 2", "Zeile 3", "Zeile 4"], c: 3, hint: "Bei 15,446 ist die dritte Stelle eine 6, also wird die zweite Stelle (4) auf 5 aufgerundet." },
        
        // MESSWERTE (S. 3)
        { t: "Längen & Masse", q: "Berechne L: 1,25m + 251cm + 15cm + 14,3mm (Genauigkeit beachten!)", o: ["3924,3 mm", "392,4 cm", "3,92 m", "3,9 m"], c: 2, hint: "Das Ergebnis darf nicht genauer als der ungenaueste Wert (1,25m -> 2 Dezimalen) sein. Summe: 3,9243m -> 3,92m." },
        { t: "Längen & Masse", q: "Gesamtmasse m: 2,1kg + 1442g + 104,5g", o: ["3646,5 g", "3,647 kg", "3,65 kg", "3,6 kg"], c: 3, hint: "2,1kg hat nur eine Nachkommastelle. Summe 3,6465kg wird auf 3,6kg gerundet." },
        
        // FORMELN (S. 4-6)
        { t: "Formelumstellung", q: "Stelle P = W / t nach t um.", o: ["t = W + P", "t = P / W", "t = W / P", "t = W * P"], c: 2, hint: "t und P tauschen die Plätze: t = W / P." },
        { t: "Formelumstellung", q: "Stelle v_c = (d * π * n) / 1000 nach d um.", o: ["d = (1000 * v_c) / (π * n)", "d = (π * n) / (1000 * v_c)", "d = 1000 / (v_c * π * n)"], c: 0, hint: "1000 wandert mit '*' nach oben, π und n mit '/' nach unten." },
        { t: "Formelumstellung", q: "Stelle P = I² * R nach I um.", o: ["I = P / R", "I = √(P / R)", "I = √(P * R)"], c: 1, hint: "Zuerst durch R teilen, dann die Wurzel ziehen." },
        { t: "Formelumstellung", q: "Stelle A = (a+b)/2 * h nach b um.", o: ["b = A / (2h) - a", "b = (2A / h) - a", "b = (2A / h) + a"], c: 1, hint: "Schrittweise: 2A/h = a + b, dann -a." },

        // GEOMETRIE & TEILUNG (S. 7-15)
        { t: "Technik-Rechnen", q: "Stahlstab 895mm im Verhältnis 2:3 teilen. Wie lang ist das größere Stück?", o: ["179 mm", "358 mm", "537 mm"], c: 2, hint: "Gesamtanteile: 5. Ein Teil: 895/5=179. Großes Stück: 179*3=537mm." },
        { t: "Technik-Rechnen", q: "Lochleiste 1600mm, 14 Löcher, Randabstände je 25,5mm. Berechne p.", o: ["123 mm", "121 mm", "119 mm", "110 mm"], c: 2, hint: "Nutztiefe: 1600 - (2*25,5) = 1549. Abstände: 14-1=13. p = 1549/13 = 119,15 -> 119mm." },
        { t: "Technik-Rechnen", q: "5,5m Stange, 15 Stücke à 240,5mm, Sägeblatt 3,0mm. Restlänge L?", o: ["1,4 m", "1,6 m", "1,8 m", "1,9 m"], c: 2, hint: "Verbrauch: 15 * (240,5 + 3,0) = 3652,5mm. Rest: 5500 - 3652,5 = 1847,5mm -> 1,8m." },
        
        // EINHEITEN (S. 20)
        { t: "Grundlagen", q: "Wieviel dm² sind 6317 cm²?", o: ["0,6317", "63,17", "631,7", "63170"], c: 1, hint: "Umrechnungszahl 100 bei Flächen: 6317 / 100 = 63,17 dm²." }
    ];

    let user = "", currentTopic = "", pool = [], qIdx = 0, score = 0;

    function doLogin() {
        user = document.getElementById('userName').value;
        if(!user) return alert("Name?");
        document.getElementById('displayUser').innerText = "User: " + user;
        nav('screen-dashboard');
        renderTopics();
    }

    function renderTopics() {
        const grid = document.getElementById('topicGrid');
        const topics = [...new Set(db.map(q => q.t))];
        grid.innerHTML = "";
        topics.forEach(t => {
            const d = document.createElement('div');
            d.className = 'topic-card';
            d.innerHTML = `<h3>${t}</h3><small>${db.filter(x=>x.t===t).length} Fragen</small>`;
            d.onclick = () => {
                document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
                d.classList.add('selected');
                currentTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            grid.appendChild(d);
        });
    }

    function initQuiz() {
        pool = db.filter(q => q.t === currentTopic).sort(() => Math.random() - 0.5);
        qIdx = 0; score = 0;
        document.getElementById('currentScore').innerText = "0";
        nav('screen-quiz');
        loadQ();
    }

    function loadQ() {
        const q = pool[qIdx];
        document.getElementById('qProgress').innerText = `Frage ${qIdx + 1}/${pool.length}`;
        document.getElementById('questionText').innerText = q.q;
        const area = document.getElementById('optionsArea');
        area.innerHTML = "";
        q.o.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o;
            b.onclick = () => {
                if(i === q.c) { score += 10; document.getElementById('currentScore').innerText = score; nextQ(); }
                else { document.getElementById('explText').innerText = q.hint; document.getElementById('explOverlay').style.display = 'flex'; }
            };
            area.appendChild(b);
        });
    }

    function nextQ() {
        qIdx++;
        if(qIdx < pool.length) loadQ();
        else { alert("Fertig! Score: " + score); saveScore(); nav('screen-dashboard'); }
    }

    function closeExpl() { document.getElementById('explOverlay').style.display = 'none'; nextQ(); }

    function saveScore() {
        let lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        lb.push({n: user, s: score, t: currentTopic});
        localStorage.setItem('ihk_scores', JSON.stringify(lb));
    }

    function showLB() {
        nav('screen-leaderboard');
        const lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        document.getElementById('lbList').innerHTML = lb.sort((a,b)=>b.s-a.s).map(e => `<div style="padding:10px; border-bottom:1px solid #eee;">${e.n}: ${e.s} Pkt (${e.t})</div>`).join('');
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }
</script>
</body>
</html>
