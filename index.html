<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>IHK Akademie Schwaben Lern-App</title>
    <style>
        /* Grundfarben */
        :root {
            --ihk-blau: #00457D;
            --ihk-rot: #E3001B;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            /* Hintergrund: Erst das Bild, dann die Farbe Blau als Backup */
            background: url('hintergrund.jpg') center/cover no-repeat fixed var(--ihk-blau);
            color: white;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 60px;
            background: rgba(0, 69, 125, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* Hauptbereich */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* Header mit Logo */
        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .logo { height: 40px; filter: brightness(0) invert(1); }

        /* Kacheln */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .card:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); }
        .card.active { border: 3px solid var(--ihk-rot); background: rgba(255, 255, 255, 0.25); }

        .btn-start {
            width: 100%;
            background: var(--ihk-rot);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-start:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }

        /* Quiz Ansicht */
        .quiz {
            display: none;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
        }

        .opt {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
        }

        .opt:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="sidebar">🏠<br><br>💬<br><br>👥</div>

    <div class="main">
        <div class="header">
            <img src="https://www.ihk-akademie-schwaben.de/fileadmin/templates/images/logo_ihk_akademie_schwaben.png" class="logo">
            <span id="score">Punkte: 0</span>
        </div>

        <div id="dash">
            <h1>Lern-App</h1>
            <div class="grid" id="topics"></div>
            <button class="btn-start" id="sBtn" onclick="startQuiz()" disabled>QUIZ STARTEN</button>
        </div>

        <div id="qView" class="quiz">
            <button onclick="showDash()" style="color:white; background:none; border:none; cursor:pointer;">⬅ Zurück</button>
            <h2 id="qText">Frage...</h2>
            <div id="options"></div>
        </div>
    </div>

<script>
    const data = [
        { t: "Metalltechnik", q: "Welches Werkzeug nutzt man zum Anreißen?", o: ["Hammer", "Reißnadel", "Feile"], c: 1 },
        { t: "Steuerungstechnik", q: "Was bedeutet SPS?", o: ["Sicherheits-System", "Speicherprogrammierbare Steuerung", "Sensor-System"], c: 1 },
        { t: "Elektrotechnik", q: "Einheit des Widerstands?", o: ["Volt", "Ampere", "Ohm"], c: 2 }
    ];

    let sel = null;
    const icons = { "Metalltechnik": "⚙️", "Steuerungstechnik": "🕹️", "Elektrotechnik": "⚡" };

    function init() {
        const g = document.getElementById('topics');
        const ts = [...new Set(data.map(d => d.t))];
        g.innerHTML = "";
        ts.forEach(t => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div style="font-size:3rem">${icons[t]||'📚'}</div><br><b>${t}</b>`;
            div.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                div.classList.add('active'); sel = t;
                document.getElementById('sBtn').disabled = false;
            };
            g.appendChild(div);
        });
    }

    function startQuiz() {
        document.getElementById('dash').style.display = 'none';
        document.getElementById('qView').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const q = data.find(d => d.t === sel);
        document.getElementById('qText').innerText = q.q;
        const oContainer = document.getElementById('options');
        oContainer.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = opt;
            b.onclick = () => {
                if(i === q.c) { alert("Richtig!"); showDash(); }
                else { alert("Leider falsch."); }
            };
            oContainer.appendChild(b);
        });
    }

    function showDash() {
        document.getElementById('dash').style.display = 'block';
        document.getElementById('qView').style.display = 'none';
    }

    init();
</script>
</body>
</html>
