<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Lern-App - TechMathe</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        
        .sidebar { width: 64px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-icon { font-size: 24px; color: white; margin-bottom: 30px; cursor: pointer; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 48px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: 600; }
        .content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        
        #loginScreen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .topic-box { background: white; padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .topic-box.active { border-color: var(--ihk-rot); background: #fffafa; }
        
        .btn { background: var(--ihk-rot); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .view { display: none; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 1rem; }

        /* ERKLÄRUNGS-OVERLAY (Das Pop-up) */
        #explanationOverlay {
            display: none; /* Standardmäßig unsichtbar */
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .expl-card { background: white; padding: 30px; border-radius: 12px; max-width: 500px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div id="explanationOverlay">
        <div class="expl-card">
            <h2 style="color:var(--ihk-rot); margin-top:0;">Nicht ganz richtig...</h2>
            <p id="explText" style="line-height:1.6; font-size:1.1rem; margin: 20px 0;"></p>
            <button class="btn" onclick="closeExpl()">Verstanden & Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
    </div>

    <div class="main">
        <div class="topbar">IHK Akademie - Technisches Lernen</div>
        <div class="content">
            
            <div id="loginScreen">
                <div class="card">
                    <h2 style="color:var(--ihk-blau)">Anmeldung</h2>
                    <input type="text" id="uName" placeholder="Dein Name..." style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">
                    <button class="btn" onclick="login()">Starten</button>
                </div>
            </div>

            <div id="dashboard" style="display:none">
                <h1>Themenbereiche</h1>
                <div class="grid" id="topicGrid"></div>
                <button class="btn" id="startBtn" onclick="initQuiz()" disabled style="margin-top:20px">QUIZ STARTEN</button>
            </div>

            <div id="quizView" class="view">
                <h2 id="qText" style="color:var(--ihk-blau); margin-top:0;"></h2>
                <div id="optContainer"></div>
            </div>

        </div>
    </div>

<script>
    const questions = [
        { 
            t: "Technische Mathematik", 
            q: "Runde die Zahl 8,579 613 auf drei Ziffern hinter dem Komma.", 
            o: ["8,579", "8,578", "8,580"], 
            c: 2,
            hint: "Die vierte Ziffer nach dem Komma ist eine '6'. Ab der Ziffer 5 wird aufgerundet. Aus der '9' am Ende wird also eine '10', was die Stelle davor um 1 erhöht. Das Ergebnis ist 8,580."
        },
        { 
            t: "Technische Mathematik", 
            q: "Was ist das richtige Ergebnis für: 1,25m + 251cm + 15cm + 14,3mm (nach Rechenregeln für Messwerte)?", 
            o: ["3,9243 m", "3,92 m", "3,9 m"], 
            c: 1,
            hint: "Regel: Das Ergebnis darf nicht genauer sein als das ungenaueste Maß. 1,25m hat zwei Stellen nach dem Komma. Deshalb runden wir das Gesamtergebnis auch auf zwei Stellen: 3,92m."
        }
    ];

    let user = "", selectedTopic = null, pool = [], currentQIdx = 0;

    function login() {
        user = document.getElementById('uName').value;
        if(!user) return alert("Bitte Name eingeben!");
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderTopics();
    }

    function renderTopics() {
        const g = document.getElementById('topicGrid');
        const ts = ["Technische Mathematik"];
        g.innerHTML = "";
        ts.forEach(t => {
            const d = document.createElement('div');
            d.className = 'topic-box';
            d.innerHTML = `<span style="font-size:2rem">🧮</span><br><b>${t}</b>`;
            d.onclick = () => {
                document.querySelectorAll('.topic-box').forEach(b => b.classList.remove('active'));
                d.classList.add('active'); selectedTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            g.appendChild(d);
        });
    }

    function initQuiz() {
        pool = questions.filter(q => q.t === selectedTopic);
        currentQIdx = 0;
        showView('quizView');
        loadQuestion();
    }

    function loadQuestion() {
        const q = pool[currentQIdx];
        document.getElementById('qText').innerText = q.q;
        const container = document.getElementById('optContainer');
        container.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => checkAnswer(i);
            container.appendChild(b);
        });
    }

    function checkAnswer(idx) {
        const q = pool[currentQIdx];
        if(idx === q.c) {
            alert("Richtig! 🌟");
            nextQuestion();
        } else {
            // ERKLÄRUNG ANZEIGEN
            document.getElementById('explText').innerText = q.hint;
            document.getElementById('explanationOverlay').style.display = 'flex';
            // Wichtig: Wir rufen nextQuestion() hier NICHT auf, 
            // sondern erst wenn der Button im Pop-up geklickt wird!
        }
    }

    function closeExpl() {
        document.getElementById('explanationOverlay').style.display = 'none';
        nextQuestion();
    }

    function nextQuestion() {
        currentQIdx++;
        if(currentQIdx < pool.length) {
            loadQuestion();
        } else {
            alert("Thema abgeschlossen!");
            goHome();
        }
    }

    function goHome() {
        document.getElementById('quizView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    function showView(id) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
