<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Schwaben - Lern-App</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        
        .sidebar { width: 64px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-icon { font-size: 24px; color: white; margin-bottom: 30px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 48px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: 600; }
        .content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

        #loginScreen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        .app-header { background: white; padding: 15px 25px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .topic-box { 
            background: white; padding: 30px; border-radius: 12px; text-align: center; 
            cursor: pointer; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: 0.2s; display: flex; flex-direction: column; align-items: center;
        }
        .topic-box:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .topic-box.active { border-color: var(--ihk-rot); background: #fffafa; }
        .topic-box.exam { border: 2px dashed var(--ihk-rot); background: #fffdf0; }

        .btn { background: var(--ihk-rot); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .view { display: none; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; }
        .opt-btn:hover { background: #f0f7ff; border-color: var(--ihk-blau); }
        
        .lb-entry { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
        <div class="nav-icon" onclick="showLeaderboard()">🏆</div>
    </div>

    <div class="main">
        <div class="topbar">IHK Akademie Schwaben - Lern-App</div>
        <div class="content">
            <div id="loginScreen">
                <div class="login-card">
                    <h2 style="color:var(--ihk-blau); margin-top:0;">Anmeldung</h2>
                    <input type="text" id="uName" placeholder="Dein Name...">
                    <input type="password" id="adminPw" placeholder="Admin-Passwort (optional)">
                    <button class="btn" onclick="login()">Starten</button>
                </div>
            </div>

            <div id="uiHeader" class="app-header" style="display:none;">
                <div id="userNameDisplay" style="font-weight:bold;">👤 Gast</div>
                <div style="color:#f59e0b; font-weight:bold;">⭐ <span id="pointsDisplay">0</span> Pkt.</div>
            </div>

            <div id="dashboard" style="display:none;">
                <h1 style="color:var(--ihk-blau); margin-top:0;">Themenbereiche</h1>
                <div class="grid" id="topicGrid"></div>
                <button class="btn" id="startBtn" onclick="initQuiz()" disabled style="margin-top:25px;">QUIZ STARTEN</button>
            </div>

            <div id="quizView" class="view">
                <h2 id="qText" style="color:var(--ihk-blau);">Frage</h2>
                <div id="optContainer"></div>
            </div>

            <div id="leaderboardView" class="view">
                <h2 style="color:var(--ihk-blau);">🏆 Bestenliste</h2>
                <div id="lList"></div>
                <button class="btn" onclick="goHome()" style="margin-top:20px; background:var(--ihk-blau);">Zurück</button>
            </div>
        </div>
    </div>

<script>
    const MASTER_PW = "ihk2024";
    const questions = [
        { t: "Steuerungstechnik", q: "Was bedeutet SPS?", o: ["System-Plan", "Speicherprogrammierbare Steuerung", "Sensor-Steuerung"], c: 1 },
        { t: "Metalltechnik", q: "Werkzeug zum Anreißen?", o: ["Hammer", "Reißnadel", "Feile"], c: 1 },
        { t: "Elektrotechnik", q: "Einheit des Widerstands?", o: ["Volt", "Ampere", "Ohm"], c: 2 },
        { t: "Prüfungsvorbereitung", q: "Was ist zur Prüfung zwingend mitzubringen?", o: ["Berichtsheft", "Lichtbildausweis", "Beides"], c: 2 }
    ];

    let user = "", score = 0, selectedTopic = null, pool = [], currentQIdx = 0, isAdmin = false;

    function login() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("Bitte Namen eingeben!");
        user = name;
        if(document.getElementById('adminPw').value === MASTER_PW) { isAdmin = true; user = "⭐ Admin (" + name + ")"; }
        document.getElementById('userNameDisplay').innerText = "👤 " + user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('uiHeader').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'block';
        renderTopics();
    }

    function renderTopics() {
        const g = document.getElementById('topicGrid');
        const ts = ["Metalltechnik", "Steuerungstechnik", "Elektrotechnik", "Prüfungsvorbereitung"];
        g.innerHTML = "";
        ts.forEach(t => {
            const d = document.createElement('div');
            d.className = 'topic-box' + (t === "Prüfungsvorbereitung" ? " exam" : "");
            d.innerHTML = `<span style="font-size:2rem; margin-bottom:10px;">${t === 'Prüfungsvorbereitung' ? '🎓' : '📚'}</span><b>${t}</b>`;
            d.onclick = () => {
                document.querySelectorAll('.topic-box').forEach(b => b.classList.remove('active'));
                d.classList.add('active'); selectedTopic = t;
                document.getElementById('startBtn').disabled = false;
            };
            g.appendChild(d);
        });
    }

    function initQuiz() {
        pool = questions.filter(q => q.t === selectedTopic);
        if(pool.length === 0) return alert("Noch keine Fragen für dieses Thema hinterlegt!");
        pool.sort(() => Math.random() - 0.5);
        currentQIdx = 0;
        showView('quizView');
        loadQuestion();
    }

    function loadQuestion() {
        const q = pool[currentQIdx];
        document.getElementById('qText').innerText = q.q;
        const container = document.getElementById('optContainer');
        container.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(i === q.c) { score += 10; document.getElementById('pointsDisplay').innerText = score; alert("Richtig!"); saveScore(); }
                else { alert("Falsch!"); }
                currentQIdx++;
                if(currentQIdx < pool.length) loadQuestion();
                else { alert("Thema abgeschlossen!"); goHome(); }
            };
            container.appendChild(b);
        });
    }

    function saveScore() {
        let lb = JSON.parse(localStorage.getItem('ihk_app_lb') || '[]');
        const i = lb.findIndex(item => item.n === user);
        if(i > -1) { if(score > lb[i].s) lb[i].s = score; }
        else { lb.push({n: user, s: score}); }
        lb.sort((a,b) => b.s - a.s);
        localStorage.setItem('ihk_app_lb', JSON.stringify(lb));
    }

    function showLeaderboard() {
        if(!user) return;
        showView('leaderboardView');
        const lb = JSON.parse(localStorage.getItem('ihk_app_lb') || '[]');
        document.getElementById('lList').innerHTML = lb.map(u => `
            <div class="lb-entry">
                <span>${u.n}</span>
                <span><b>${u.s} Pkt.</b> ${isAdmin ? `<button class="del-btn" onclick="deleteEntry('${u.n}')">X</button>` : ''}</span>
            </div>
        `).join('');
    }

    function deleteEntry(name) {
        if(!confirm(name + " löschen?")) return;
        let lb = JSON.parse(localStorage.getItem('ihk_app_lb') || '[]');
        lb = lb.filter(u => u.n !== name);
        localStorage.setItem('ihk_app_lb', JSON.stringify(lb));
        showLeaderboard();
    }

    function goHome() {
        if(!user) return;
        showView('dashboard');
        selectedTopic = null;
        document.getElementById('startBtn').disabled = true;
        renderTopics();
    }

    function showView(id) {
        ['dashboard', 'quizView', 'leaderboardView'].forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
