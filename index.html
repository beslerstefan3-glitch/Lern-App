<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHK Akademie Trainer Pro</title>
    <style>
        :root { --ihk-blau: #00457D; --ihk-rot: #E3001B; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 70px; background: var(--ihk-blau); display: flex; flex-direction: column; align-items: center; padding-top: 20px; flex-shrink: 0; }
        .nav-icon { font-size: 26px; color: white; margin-bottom: 25px; cursor: pointer; transition: 0.3s; opacity: 0.8; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 50px; background: var(--ihk-blau); color: white; display: flex; align-items: center; padding: 0 20px; font-weight: bold; justify-content: space-between; }
        
        .content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 900px; }
        .active-screen { display: block; }

        /* Dashboard Grid & Icons */
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; width: 100%; }
        .topic-card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #ddd;
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .topic-card:hover { border-color: var(--ihk-rot); transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .topic-icon { font-size: 50px; margin-bottom: 15px; }
        
        /* Quiz & UI */
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .opt-btn { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover { background: #f0f7ff; border-color: var(--ihk-blau); }
        .btn-primary { background: var(--ihk-rot); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #explOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .expl-box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .lb-entry { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="explOverlay">
        <div class="expl-box">
            <h2 style="color:var(--ihk-rot)">💡 Lösungsweg</h2>
            <p id="explText" style="text-align: left; line-height: 1.6; margin: 20px 0;"></p>
            <button class="btn-primary" onclick="closeExpl()">Verstanden & Weiter</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-icon" title="Home" onclick="nav('screen-dashboard')">🏠</div>
        <div class="nav-icon" title="Bestenliste" onclick="showLB()">🏆</div>
    </div>

    <div class="main">
        <div class="topbar"><span>IHK AKADEMIE TRAINER</span><span id="displayUser"></span></div>
        <div class="content">
            
            <div id="screen-login" class="screen active-screen">
                <div class="card" style="max-width: 400px; margin-top: 50px;">
                    <h2 style="color:var(--ihk-blau)">Anmeldung</h2>
                    <input type="text" id="userName" placeholder="Dein Name...">
                    <input type="password" id="adminKey" placeholder="Admin-Passwort">
                    <button class="btn-primary" onclick="doLogin()">Training starten</button>
                </div>
            </div>

            <div id="screen-dashboard" class="screen">
                <h1 style="color:var(--ihk-blau); text-align: center;">Wähle dein Fachgebiet</h1>
                <div class="topic-grid" id="topicGrid"></div>
            </div>

            <div id="screen-quiz" class="screen">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--ihk-rot); font-weight:bold;">
                        <span id="qProgress"></span>
                        <span>Score: <span id="currentScore">0</span></span>
                    </div>
                    <h2 id="questionText"></h2>
                    <div id="optionsArea"></div>
                </div>
            </div>

            <div id="screen-leaderboard" class="screen">
                <div class="card">
                    <h1>🏆 Bestenliste</h1>
                    <div id="lbList"></div>
                    <button class="btn-primary" onclick="nav('screen-dashboard')">Zurück</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const ADMIN_PW = "ihk2024";

    // ############################################################################################
    // ###                                                                                      ###
    // ###                  HIER NEUE FRAGEN EINTRAGEN (DATENBANK)                              ###
    // ###                                                                                      ###
    // ############################################################################################

    const db = [
        // TOPIC: Fachrechnen (S. 1-22)
        { t: "Fachrechnen", q: "Runde 8,579 613 auf drei Ziffern hinter dem Komma.", o: ["8,579", "8,578", "8,580", "8,581"], c: 2, hint: "Vierte Stelle ist 6 -> Aufrunden der 9 zur 10 -> 8,580." },
        
        // TOPIC: Metalltechnik
        { t: "Metalltechnik", q: "Ein Stahlstab (895 mm) im Verhältnis 2:3 geteilt. Längeres Stück?", o: ["179 mm", "358 mm", "537 mm"], c: 2, hint: "895 / 5 Anteile = 179. Großes Stück: 3 * 179 = 537 mm." },
        { t: "Metalltechnik", 
        q: "Welches Bild zeigt die richtige Einteilung der Werkstoffe in Werkstoffgruppen?", 
        o: ["Bild 1", "Bild 2", "Bild 3", "Bild 4", "Bild 5"], 
        c: 0, 
        img: "0001.png", // Du musst ein Screenshot von Aufgabe 0001 machen und als 0001.png speichern
        hint: "Werkstoffe werden primär in Metalle und Nichtmetalle unterteilt (siehe Organigramm 1)." 
    },
    { 
        t: "Metalltechnik", 
        q: "In welche zwei Hauptgruppen werden die Werkstoffe eingeteilt?", 
        o: ["Kunststoffe und Keramik", "Metalle und Nichtmetalle", "Metalle und Naturstoffe", "Stähle und Guss"], 
        c: 1, 
        img: "", // Textaufgabe ohne Bild
        hint: "Die Basis-Einteilung ist Metalle / Nichtmetalle." 
    },
    { 
        t: "Metalltechnik", 
        q: "In welche Gruppen werden die Nichteisenmetalle unterteilt?", 
        o: ["Hart- und Weichmetalle", "Schwer- und Leichtmetalle", "Guss- und Knetlegierungen"], 
        c: 1, 
        img: "0004.png", // Screenshot von Aufgabe 0004
        hint: "NE-Metalle trennt man nach der Dichte in Schwer- und Leichtmetalle." 
    }
];
        // TOPIC: Elektrotechnik
        { t: "Elektrotechnik", q: "Stelle nach I um: P = I² * R", o: ["I = P / R", "I = √(P / R)", "I = √(P * R)"], c: 1, hint: "Durch R teilen, dann Wurzel ziehen." },

        // TOPIC: Technische Kommunikation
        { t: "Technische Kommunikation", q: "Berechne L = 1,25m + 251cm + 15cm + 14,3mm (Genauigkeit beachten).", o: ["3924,3 mm", "392,4 cm", "3,92 m", "3,9 m"], c: 2, hint: "Ergebnis richtet sich nach dem ungenauesten Maß (1,25m) -> 3,92m." },

        // TOPIC: Prüfungsvorbereitung
        { t: "Prüfungsvorbereitung", q: "Stange 5,5m, 15 Stücke à 240,5mm, Sägeblatt 3mm. Rest L?", o: ["1,4 m", "1,6 m", "1,8 m", "1,9 m"], c: 2, hint: "15 * (240,5 + 3) = 3652,5. 5500 - 3652,5 = 1847,5 -> 1,8 m." }
    ];

    // Zuordnung von Icons zu den Topics
    const topicIcons = {
        "Metalltechnik": "⚙️",        // Fräser/Zahnrad Symbol
        "Elektrotechnik": "⚡",      // Blitz für Strom
        "Technische Kommunikation": "📐", // Winkelmaß für Zeichnungen
        "Fachrechnen": "🧮",         // Abakus/Rechnen
        "Prüfungsvorbereitung": "📝"  // Block für Prüfung
    };

    const mainTopics = ["Metalltechnik", "Elektrotechnik", "Technische Kommunikation", "Fachrechnen", "Prüfungsvorbereitung"];

    // ############################################################################################
    // ###                               ENDE DER FRAGEN-DATENBANK                              ###
    // ############################################################################################

    let user = "", isAdmin = false, score = 0, qIdx = 0, pool = [], currentTopic = "";

    function doLogin() {
        const n = document.getElementById('userName').value;
        const p = document.getElementById('adminKey').value;
        if(!n) return alert("Name fehlt!");
        user = n; isAdmin = (p === ADMIN_PW);
        document.getElementById('displayUser').innerText = "User: " + user;
        renderTopics();
        nav('screen-dashboard');
    }

    function renderTopics() {
        const grid = document.getElementById('topicGrid');
        grid.innerHTML = "";
        mainTopics.forEach(t => {
            const count = db.filter(q => q.t === t).length;
            const icon = topicIcons[t] || "❓";
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `
                <div class="topic-icon">${icon}</div>
                <h2 style="color:var(--ihk-blau);margin:0;">${t}</h2>
                <p style="color:#666; margin-top:10px;">${count} Aufgaben</p>
            `;
            card.onclick = () => { if(count > 0) startQuiz(t); else alert("Thema wird befüllt!"); };
            grid.appendChild(card);
        });
    }

    function startQuiz(topic) {
        currentTopic = topic;
        pool = db.filter(q => q.t === topic).sort(() => Math.random() - 0.5);
        qIdx = 0; score = 0;
        document.getElementById('currentScore').innerText = "0";
        nav('screen-quiz');
        loadQ();
    }

   function loadQ() {
    const q = pool[qIdx];
    document.getElementById('qProgress').innerText = `${currentTopic}: ${qIdx + 1}/${pool.length}`;
    document.getElementById('questionText').innerText = q.q;
    
    const area = document.getElementById('optionsArea');
    area.innerHTML = "";

    // BILD-LOGIK: Wenn ein Bildpfad in der DB steht, wird es hier eingefügt
    if(q.img && q.img !== "") {
        const imgContainer = document.createElement('div');
        imgContainer.style.textAlign = "center";
        imgContainer.style.marginBottom = "15px";
        
        const image = document.createElement('img');
        image.src = q.img; 
        image.style.maxWidth = "100%";
        image.style.maxHeight = "250px";
        image.style.borderRadius = "8px";
        image.style.border = "1px solid #ddd";
        
        // Fehler-Handling: Falls das Bild nicht gefunden wird
        image.onerror = function() {
            imgContainer.innerHTML = `<p style="color:orange; font-size:0.8rem;">[Bild ${q.img} fehlt im Ordner]</p>`;
        };
        
        imgContainer.appendChild(image);
        area.appendChild(imgContainer);
    }

    q.o.forEach((o, i) => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.innerText = o;
        b.onclick = () => {
            if(i === q.c) { score += 10; document.getElementById('currentScore').innerText = score; nextQ(); }
            else { document.getElementById('explText').innerText = q.hint; document.getElementById('explOverlay').style.display = 'flex'; }
        };
        area.appendChild(b);
    });
}

    function nextQ() {
        qIdx++;
        if(qIdx < pool.length) loadQ();
        else { alert("Thema abgeschlossen!"); saveScore(); nav('screen-dashboard'); }
    }

    function closeExpl() { document.getElementById('explOverlay').style.display = 'none'; nextQ(); }

    function saveScore() {
        let lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        lb.push({n: user, s: score, t: currentTopic});
        localStorage.setItem('ihk_scores', JSON.stringify(lb));
    }

    function showLB() {
        nav('screen-leaderboard');
        const lb = JSON.parse(localStorage.getItem('ihk_scores') || '[]');
        document.getElementById('lbList').innerHTML = lb.sort((a,b)=>b.s-a.s).map(e => `
            <div class="lb-entry"><span><b>${e.n}</b> (${e.t})</span><span>${e.s} Pkt</span></div>`).join('');
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }
</script>
</body>
</html>
